function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function parseSVG(str){const d=new DOMParser().parseFromString('<svg xmlns="'+SVGNS+'">'+str+'</svg>',"image/svg+xml"); return Array.from(d.documentElement.childNodes);}
function pieInner(counts,R,cx,cy){
  const nz=order.filter(k=>counts[k]>0);
  if(nz.length===0) return "";
  if(nz.length===1) return '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+blocs[nz[0]].color+'"/>';
  const total=nz.reduce((t,k)=>t+counts[k],0); let ang=0,out="";
  order.forEach(k=>{const v=counts[k]||0; if(!v)return; const sweep=v/total*360,s=ang,e=ang+sweep; ang=e;
    const p1=polar(cx,cy,R,s),p2=polar(cx,cy,R,e),large=sweep>180?1:0;
    out+='<path d="M'+cx+','+cy+' L'+p1[0].toFixed(2)+','+p1[1].toFixed(2)+' A'+R+','+R+' 0 '+large+' 1 '+p2[0].toFixed(2)+','+p2[1].toFixed(2)+' Z" fill="'+blocs[k].color+'"/>';});
  return out;
}

function regionCentroid(cont){const ps=data.filter(d=>d.cont===cont&&d.sh);let x=0,y=0;ps.forEach(d=>{x+=d.lng;y+=d.lat;});return [x/ps.length,y/ps.length];}
function piePath(cx,cy,r,a0,a1){const x0=cx+r*Math.sin(a0),y0=cy-r*Math.cos(a0),x1=cx+r*Math.sin(a1),y1=cy-r*Math.cos(a1),big=(a1-a0)>Math.PI?1:0;return "M"+cx+","+cy+" L"+x0.toFixed(1)+","+y0.toFixed(1)+" A"+r+","+r+" 0 "+big+" 1 "+x1.toFixed(1)+","+y1.toFixed(1)+" Z";}
function buildGlobes(){
  const wrap=document.getElementById("globes"); if(!wrap||typeof d3==="undefined") return;
  const X=TX(), mode=mapMode; wrap.innerHTML="";
  const conts=continents.filter(c=>data.some(d=>d.cont===c));
  conts.forEach(cont=>{
    const cell=document.createElement("div"); cell.className="gcell";
    const VB=238, cx=VB/2, cy=116, r=104;
    const decl=data.filter(d=>d.cont===cont&&d.sh);
    const pend=data.filter(d=>d.cont===cont&&!d.sh);
    const base=data.filter(d=>d.cont===cont);
    let sx=0,sy=0; base.forEach(d=>{sx+=d.lng;sy+=d.lat;}); const cLng=sx/base.length, cLat=sy/base.length;
    let maxD=0; base.forEach(d=>{const dd=d3.geoDistance([d.lng,d.lat],[cLng,cLat]); if(dd>maxD)maxD=dd;});
    const clipR=Math.min(Math.PI/2, Math.max(0.42, maxD+0.16));
    const proj=d3.geoOrthographic().scale(r/Math.sin(clipR)).translate([cx,cy]).rotate([-cLng,-cLat]).clipAngle(clipR*180/Math.PI);
    const path=d3.geoPath(proj);
    let svg='<svg viewBox="0 0 '+VB+' 232" class="gsvg">';
    svg+='<circle class="g-sphere" cx="'+cx+'" cy="'+cy+'" r="'+r+'"/>';
    svg+='<path class="g-graticule" d="'+(path(d3.geoGraticule10())||'')+'"/>';
    svg+='<path class="g-land" d="'+(path(LAND)||'')+'"/>';
    const drawn=[];
    if(showPending){ pend.forEach(d=>{ if(d3.geoDistance([d.lng,d.lat],[cLng,cLat])>=clipR) return; const p=proj([d.lng,d.lat]); if(!p) return; const idx=drawn.push(d)-1; const R=Math.max(2.5,2.5+Math.sqrt(d.s)*0.7);
      svg+='<circle class="g-pt" data-i="'+idx+'" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+R.toFixed(1)+'" fill="rgba(140,140,140,.35)" stroke="rgba(110,110,110,.55)" stroke-width="0.8"/>'; }); }
    decl.forEach(d=>{ if(d3.geoDistance([d.lng,d.lat],[cLng,cLat])>=clipR) return; const p=proj([d.lng,d.lat]); if(!p) return; const idx=drawn.push(d)-1; const R=Math.max(4,4+Math.sqrt(d.s)*1.5);
      if(mode==="pie"){ const C=metricCounts(d); const ks=order.filter(k=>C[k]>0); const tot=ks.reduce((t,k)=>t+C[k],0)||1;
        if(ks.length===1){ svg+='<circle class="g-pt" data-i="'+idx+'" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+R.toFixed(1)+'" fill="'+blocs[ks[0]].color+'" fill-opacity="0.95" stroke="#fff" stroke-width="0.8"/>'; }
        else { let a=0; ks.forEach(k=>{const a1=a+2*Math.PI*C[k]/tot; svg+='<path class="g-pt" data-i="'+idx+'" d="'+piePath(p[0],p[1],R,a,a1)+'" fill="'+blocs[k].color+'" fill-opacity="0.95" stroke="#fff" stroke-width="0.8"/>'; a=a1;}); }
      } else { svg+='<circle class="g-pt" data-i="'+idx+'" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+R.toFixed(1)+'" fill="'+blocs[leaderFam(d)].color+'" fill-opacity="0.92" stroke="#fff" stroke-width="1.2"/>'; }
    });
    svg+='</svg>';
    const sObj=contSeats[cont]||{}, total=order.reduce((t,k)=>t+(sObj[k]||0),0);
    let head;
    if(total>0){ head='<div class="gcap"><span class="gcont">'+X.contShort[cont]+'</span></div>'+svg; }
    else { head='<div class="gcap"><span class="gcont">'+X.contShort[cont]+'</span> <span class="gtot">'+(LANG==="fr"?"en attente":"awaiting results")+'</span></div>'+svg; }
    cell.innerHTML=head;
    wrap.appendChild(cell);
    cell.querySelectorAll(".g-pt").forEach(node=>{ const d=drawn[+node.getAttribute("data-i")];
      const txt=()=>{const XX=TX(); if(!d.seats) return '<b>'+name(d)+'</b><br>'+(LANG==="fr"?"résultats en attente":"results pending");
        const lead=leaderFam(d), C=metricCounts(d);
        const lines=order.filter(k=>C[k]>0).map(k=>'<span style="color:'+blocs[k].color+'">\u25cf</span> '+(mapMetric==="seats"?(C[k]+' '+blocLab(k)):(pct1(C[k])+' '+blocLab(k))));
        return '<b>'+name(d)+'</b><br>'+XX.winnerLbl+' : <span style="color:'+blocs[lead].color+'">'+blocLab(lead)+'</span><br>'+lines.join('<br>');};
      node.addEventListener("mousemove",e=>showTip(e,txt()));
      node.addEventListener("mouseleave",hideTip);
      node.addEventListener("pointerdown",e=>{if(e.pointerType&&e.pointerType!=="mouse"){e.preventDefault();showTip(e,txt());}});
    });
  });
}
let _grz;window.addEventListener("resize",()=>{clearTimeout(_grz);_grz=setTimeout(()=>{if(document.querySelector(".mapwrap").classList.contains("globe"))buildGlobes();},220);});

/* ---- MAP ---- */
const map=L.map("map",{worldCopyJump:false,minZoom:2,maxBounds:[[-85,-180],[85,180]],maxBoundsViscosity:1.0}).setView([20,0],2);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:18,noWrap:true,subdomains:"abcd",attribution:"© OpenStreetMap contributors, © CARTO"}).addTo(map);
const worldBounds=L.latLngBounds([[-85,-180],[85,180]]);
map.setMaxBounds(worldBounds);
map.on("drag",function(){map.panInsideBounds(worldBounds,{animate:false});});

function iconHTML(d,mode){
  const R=Math.round(4+Math.sqrt(d.s)*2.0), size=R*2+6, c=size/2; let inner;
  if(!d.seats) inner='<circle cx="'+c+'" cy="'+c+'" r="'+(R*0.7).toFixed(1)+'" fill="rgba(140,140,140,.18)" stroke="rgba(110,110,110,.5)" stroke-width="1"/>';
  else if(mode==="winner") inner='<circle cx="'+c+'" cy="'+c+'" r="'+R+'" fill="'+blocs[leaderFam(d)].color+'" fill-opacity="0.92" stroke="#fff" stroke-width="1.4"/>';
  else inner='<circle cx="'+c+'" cy="'+c+'" r="'+(R+0.5)+'" fill="#fff"/>'+pieInner(metricCounts(d),R,c,c)+'<circle cx="'+c+'" cy="'+c+'" r="'+R+'" fill="none" stroke="#fff" stroke-width="1.2"/>';
  return {html:'<svg width="'+size+'" height="'+size+'">'+inner+'</svg>',size:size,c:c};
}
function buildPopup(d){
  const X=TX();
  let pop='<b>'+name(d)+'</b><br>'+d.s+' '+(d.s>1?X.seatN:X.seat1)+' '+X.seatOf;
  if(d.seats){const lead=leaderFam(d), C=metricCounts(d);
    pop+='<br>'+X.winnerLbl+' : <span style="color:'+blocs[lead].color+'">'+blocLab(lead)+'</span>';
    pop+='<hr style="margin:5px 0;border:none;border-top:1px solid #ddd">';
    order.forEach(k=>{if(C[k]>0){const val=mapMetric==="seats"?(C[k]+' '+(C[k]>1?X.seatN:X.seat1)):pct1(C[k]);
      pop+='<div style="display:flex;align-items:center"><span style="width:11px;height:11px;border-radius:50%;background:'+blocs[k].color+';display:inline-block;margin-right:5px"></span>'+blocLab(k)+' — <b>&nbsp;'+val+'</b></div>';}});
  } else pop+='<br><i style="color:#666">'+X.notDecl+'</i>';
  if(d.t!=null) pop+='<div style="margin-top:4px;color:#666">'+X.participation+' : '+nf(d.t)+(LANG==="fr"?" %":"%")+'</div>';
  return pop;
}
const markers=data.map(d=>{
  const ic=iconHTML(d,"winner");
  const m=L.marker([d.lat,d.lng],{icon:L.divIcon({className:"pie-icon",html:ic.html,iconSize:[ic.size,ic.size],iconAnchor:[ic.c,ic.c]})});
  m.bindPopup(()=>buildPopup(d),{maxWidth:Math.min(280,window.innerWidth-48),autoPanPadding:[12,12]}).bindTooltip(()=>name(d),{direction:"top"});
  return {d:d,m:m};
});
let mapMode="winner", showPending=true;
function scaleMarkers(){
  const k=Math.max(1, Math.min(2.4, 1+(map.getZoom()-2)*0.25));
  document.querySelectorAll("#map .pie-icon svg").forEach(el=>{el.style.transformOrigin="center"; el.style.transform="scale("+k.toFixed(3)+")";});
}
function renderMarkers(){
  markers.forEach(o=>{
    const pending=!o.d.seats;
    if(pending && !showPending){ if(map.hasLayer(o.m)) map.removeLayer(o.m); return; }
    if(!map.hasLayer(o.m)) o.m.addTo(map);
    const ic=iconHTML(o.d, mapMode);
    o.m.setIcon(L.divIcon({className:"pie-icon",html:ic.html,iconSize:[ic.size,ic.size],iconAnchor:[ic.c,ic.c]}));
  });
  scaleMarkers();
}
map.on("zoomend",scaleMarkers);

/* legend */
let mapLegend=null;
function buildLegend(){
  if(mapLegend) map.removeControl(mapLegend);
  mapLegend=L.control({position:"topright"});
  mapLegend.onAdd=function(){const div=L.DomUtil.create("div","legend"); const X=TX();
    div.innerHTML="<b>"+X.legendTitle+"</b><br>";
    order.forEach(k=>div.innerHTML+='<i style="background:'+blocs[k].color+'"></i>'+X.blocLab[k]+'<br>');
    div.innerHTML+='<span style="display:inline-block;margin:3px 5px 0 0;width:12px;height:12px;border-radius:50%;background:rgba(140,140,140,.25);border:1px solid rgba(110,110,110,.5);vertical-align:middle"></span>'+X.legendPending;
    return div;};
  mapLegend.addTo(map);
}

/* insets */
const contSeats={};
data.filter(d=>d.seats&&d.cont).forEach(d=>{contSeats[d.cont]=contSeats[d.cont]||{}; for(const k in d.seats)contSeats[d.cont][k]=(contSeats[d.cont][k]||0)+d.seats[k];});
let gmax=0; for(const c in contSeats)for(const k in contSeats[c])gmax=Math.max(gmax,contSeats[c][k]);
const insetCfg=[
  {cont:"Europe",pos:"top:8px;left:50%;transform:translateX(-50%)",box:[34,-12,72,42]},
  {cont:"Amérique du Nord",pos:"top:74px;left:8px",box:[13,-170,75,-50]},
  {cont:"Amérique latine",pos:"bottom:8px;left:8px",box:[-56,-93,33,-33]},
  {cont:"Asie & Pacifique",pos:"top:50%;right:8px;transform:translateY(-50%)",box:[-50,60,62,180]},
  {cont:"Proche & Moyen-Orient",pos:"bottom:8px;left:50%;margin-left:6px",box:[10,25,43,63]},
  {cont:"Afrique",pos:"bottom:8px;left:50%;transform:translateX(-100%);margin-left:-6px",box:[-36,-20,38,52]}
];
const insetsEl=document.getElementById("insets");
function insetHTML(cont){
  const X=TX(), sObj=contSeats[cont]||{}, total=order.reduce((t,k)=>t+(sObj[k]||0),0), short=X.contShort[cont];
  if(total===0) return '<div class="summary"><div class="st">'+short+'</div><div style="font-size:9px;color:#999;text-align:center">'+X.insetNo+'</div></div>';
  const bars=order.filter(k=>sObj[k]>0), bw=9,gap=3,padL=6,padR=6, labTop=10, chartH=30;
  const cw=padL+padR+bars.length*bw+(bars.length-1)*gap, baseline=labTop+chartH, H=baseline+2;
  let s='<svg width="'+cw+'" height="'+H+'">';
  s+='<line x1="'+(padL-1)+'" y1="'+baseline+'" x2="'+(cw-padR+1)+'" y2="'+baseline+'" stroke="#ddd"/>';
  bars.forEach((k,i)=>{const x=padL+i*(bw+gap), h=Math.max(2,(sObj[k]/gmax)*chartH), y=baseline-h;
    s+='<rect x="'+x+'" y="'+y.toFixed(1)+'" width="'+bw+'" height="'+h.toFixed(1)+'" rx="1" fill="'+blocs[k].color+'"/>';
    s+='<text x="'+(x+bw/2)+'" y="'+(y-1.5)+'" text-anchor="middle" font-size="8" fill="#555" font-weight="600">'+sObj[k]+'</text>';});
  s+='</svg>';
  return '<div class="summary"><div class="st">'+short+' · '+total+'</div>'+s+'</div>';
}
function buildInsets(){
  insetsEl.innerHTML="";
  insetCfg.forEach(c=>{const d=document.createElement("div"); d.className="inset"; d.style.cssText=c.pos; d.innerHTML=insetHTML(c.cont); insetsEl.appendChild(d); c.el=d;});
}
function boxVisible(b){const m=map.getBounds(); return !(b[3]<m.getWest()||b[1]>m.getEast()||b[2]<m.getSouth()||b[0]>m.getNorth());}
function updateInsets(){insetCfg.forEach(c=>{ if(c.el) c.el.classList.toggle("hidden",!boxVisible(c.box)); });}
map.on("moveend zoomend",updateInsets);

/* ---- CHART ---- */
const continents=["Europe","Amérique du Nord","Asie & Pacifique","Proche & Moyen-Orient","Amérique latine","Afrique"];
const declared=data.filter(d=>d.sh);
const svg=document.getElementById("chart");
let W,mL,mR,plotW,topPad,narrow,rowHeaderH,bandHalf,swarmStep,rowH,laneY,plotBottom,totalH;
const scaleX=v=>mL+(Math.max(0,Math.min(100,v))/100)*plotW;
const radC=s=> narrow ? (4+Math.sqrt(s)*1.7) : (3.2+Math.sqrt(s)*1.4);
// split a family label so the "(parties…)" or "/ other" part sits on a 2nd line
const splitLab=s=>{let i=s.indexOf(" (");if(i>=0)return[s.slice(0,i),s.slice(i+1)];i=s.indexOf(" / ");if(i>=0)return[s.slice(0,i),s.slice(i+3)];return[s,""];};
// One row per political family. x = that family's vote share in each constituency
// where it ran; SOLID dot = it won >=1 seat there, HOLLOW = ran but won none.
// Rows are fixed compact bands (mild overlap only in the densest families) so the
// figure stays short on a phone instead of growing many times over.
function computeDims(){
  const host=document.querySelector(".chartscroll");
  const cw=(host&&host.clientWidth)?host.clientWidth:window.innerWidth;
  narrow=cw<640; topPad=14;
  if(narrow){ W=Math.max(320,Math.min(cw,520)); mL=12; mR=12; rowHeaderH=30; bandHalf=38; swarmStep=5.5; }
  else { W=900; mL=180; mR=30; rowHeaderH=0; bandHalf=30; swarmStep=5.0; }
  rowH=rowHeaderH+2*bandHalf+(narrow?12:16);
  plotW=W-mL-mR;
  laneY=order.map((_,i)=>topPad+i*rowH);
  plotBottom=topPad+order.length*rowH;
  totalH=plotBottom+34;
  svg.setAttribute("viewBox","0 0 "+W+" "+totalH);
}
function E(t,a){const e=document.createElementNS(SVGNS,t); for(const k in a)e.setAttribute(k,a[k]); return e;}
let dots=[];
function buildChart(){
  const X=TX(); computeDims(); svg.innerHTML="";
  [25,50,75,100].forEach(v=>{const x=scaleX(v);
    svg.appendChild(E("line",{class:"grid",x1:x,y1:topPad,x2:x,y2:plotBottom}));
    const t=E("text",{class:"axislab",x:x,y:plotBottom+18,"text-anchor":"middle"}); t.textContent=v+"%"; svg.appendChild(t);});
  svg.appendChild(E("line",{class:"grid",x1:scaleX(0),y1:topPad,x2:scaleX(0),y2:plotBottom}));
  const axt=E("text",{class:"axislab",x:mL+plotW/2,y:totalH-2,"text-anchor":"middle"}); axt.textContent=(LANG==="fr"?"Part des voix (%)":"Vote share (%)"); svg.appendChild(axt);
  dots=[];
  order.forEach((k,i)=>{
    const y0=laneY[i], cy=y0+rowHeaderH+bandHalf, col=blocs[k].color, nm=blocLab(k);
    svg.appendChild(E("rect",{x:0,y:y0,width:W,height:rowH,fill:i%2?"#fff":"#f1f2f4"}));
    const items=declared.filter(d=>(d.sh[k]||0)>0).map(d=>({d,v:d.sh[k],won:(d.seats[k]||0)>0,x:scaleX(d.sh[k]),r:radC(d.s)}));
    const ran=items.length, won=items.filter(o=>o.won).length;
    const subTxt=(LANG==="fr"?(ran+" circ. · "+won+" avec siège"):(ran+" ran · "+won+" won"));
    const lp=splitLab(nm);
    if(rowHeaderH){
      svg.appendChild(E("rect",{x:12,y:y0+4,width:10,height:10,rx:2,fill:col}));
      const lab=E("text",{class:"lane-label",x:27,y:y0+13}); lab.textContent=lp[0]; svg.appendChild(lab);
      const sub=E("text",{class:"lane-count",x:W-mR,y:y0+13,"text-anchor":"end"}); sub.textContent=subTxt; svg.appendChild(sub);
      if(lp[1]){ const p2=E("text",{class:"lane-count",x:27,y:y0+26}); p2.textContent=lp[1]; svg.appendChild(p2); }
    } else if(lp[1]){
      svg.appendChild(E("rect",{x:10,y:cy-22,width:11,height:11,rx:2,fill:col}));
      const l1=E("text",{class:"lane-label",x:27,y:cy-11}); l1.textContent=lp[0]; svg.appendChild(l1);
      const l2=E("text",{class:"lane-count",x:27,y:cy+3}); l2.textContent=lp[1]; svg.appendChild(l2);
      const l3=E("text",{class:"lane-count",x:27,y:cy+17}); l3.textContent=subTxt; svg.appendChild(l3);
    } else {
      svg.appendChild(E("rect",{x:10,y:cy-13,width:11,height:11,rx:2,fill:col}));
      const l1=E("text",{class:"lane-label",x:27,y:cy-2}); l1.textContent=lp[0]; svg.appendChild(l1);
      const l3=E("text",{class:"lane-count",x:27,y:cy+13}); l3.textContent=subTxt; svg.appendChild(l3);
    }
    // capped-band swarm: place by ascending x, clamp into the band (mild overlap)
    const byX=items.slice().sort((a,b)=>a.x-b.x), placed=[];
    byX.forEach(it=>{let y=cy,kk=0,found=false;
      while(kk<400){const cand=cy+(kk%2?-1:1)*Math.ceil(kk/2)*swarmStep;
        if(Math.abs(cand-cy)+it.r<=bandHalf && placed.every(p=>Math.hypot(p.x-it.x,p.y-cand)>=p.r+it.r+0.8)){y=cand;found=true;break;} kk++;}
      it.y=found?y:cy; placed.push(it);});
    // hollow (no seat) underneath, solid (won) on top
    items.slice().sort((a,b)=>(a.won?1:0)-(b.won?1:0)).forEach(it=>{
      const g=E("g",{class:"dotg"});
      if(it.won) g.appendChild(E("circle",{r:it.r,fill:col,"fill-opacity":0.9,stroke:"#fff","stroke-width":1}));
      else g.appendChild(E("circle",{r:it.r,fill:"#fff","fill-opacity":0.92,stroke:col,"stroke-width":1.7}));
      g.setAttribute("transform","translate("+it.x.toFixed(1)+","+it.y.toFixed(1)+")");
      svg.appendChild(g);
      const tip=()=>{const X2=TX(); const sw=it.d.seats[k]||0;
        const seatTxt=it.won?(sw+' '+(sw>1?X2.seatN:X2.seat1)):(LANG==="fr"?"aucun siège":"no seat");
        return '<b>'+name(it.d)+'</b><br><span style="color:'+col+'">\u25cf</span> '+nm+' : <b>'+pct1(it.v)+'</b><br>'+seatTxt+' · '+it.d.s+' '+(it.d.s>1?X2.seatN:X2.seat1)+' '+(LANG==="fr"?"au total":"total");};
      g.addEventListener("mousemove",e=>showTip(e,tip()));
      g.addEventListener("mouseleave",hideTip);
      g.addEventListener("pointerdown",e=>{if(e.pointerType&&e.pointerType!=="mouse"){e.preventDefault();showTip(e,tip());}});
      dots.push({g});
    });
  });
}
// re-fit the spectrum when the viewport changes (phone rotation, resize)
let _chartRsz; window.addEventListener("resize",function(){clearTimeout(_chartRsz); _chartRsz=setTimeout(function(){ if(dots.length) buildChart(); },180);});
function buildPills(){ const p=document.getElementById("pills"); if(p) p.style.display="none"; }

/* ---- TRENDS ---- */
function buildTrends(){
  const X=TX();
  const seatTotals={}, leadCount={}, voteSum={}; let totalSeats=0, exTot=0;
  declared.forEach(d=>{ for(const k in d.seats){seatTotals[k]=(seatTotals[k]||0)+d.seats[k]; totalSeats+=d.seats[k];}
    leadCount[d.win]=(leadCount[d.win]||0)+1;
    const w=d.ex||0; if(w){ exTot+=w; order.forEach(k=> voteSum[k]=(voteSum[k]||0)+(d.sh[k]||0)*w); } });
  const n=declared.length, voteAvg={}; order.forEach(k=> voteAvg[k]= exTot ? (voteSum[k]||0)/exTot : 0);
  const seatOrder=order.slice().sort((a,b)=>(seatTotals[b]||0)-(seatTotals[a]||0));
  const leadOrder=order.slice().sort((a,b)=>(leadCount[b]||0)-(leadCount[a]||0));
  const topS=seatOrder[0], topL=leadOrder[0];
  const shortLab=k=>X.blocLab[k].split(" (")[0].replace(" / divers","").replace(" / other","");
  function makeBar(rows, fmt, paired){
    const rowH=26, lw=130, bw=250, pr=58, top=6, H=top+rows.length*rowH+4, Wd=lw+bw+pr;
    const maxv=Math.max.apply(null, rows.map(r=>Math.max(r.value,r.value2||0)).concat([1]));
    let o='<svg viewBox="0 0 '+Wd+' '+H+'" width="100%" style="max-width:'+Wd+'px">';
    rows.forEach((r,i)=>{ const y=top+i*rowH;
      o+='<text x="'+(lw-8)+'" y="'+(y+rowH/2)+'" text-anchor="end" font-size="11.5" fill="#3a372f" dominant-baseline="middle">'+r.label+'</text>';
      if(paired){ const h=9;
        o+='<rect x="'+lw+'" y="'+(y+3)+'" width="'+(r.value/maxv*bw).toFixed(1)+'" height="'+h+'" rx="2" fill="'+r.color+'"/>';
        o+='<rect x="'+lw+'" y="'+(y+3+h+2)+'" width="'+(r.value2/maxv*bw).toFixed(1)+'" height="'+h+'" rx="2" fill="'+r.color+'" opacity="0.4"/>';
        o+='<text x="'+(lw+Math.max(r.value,r.value2)/maxv*bw+6)+'" y="'+(y+rowH/2)+'" font-size="10" fill="#777" dominant-baseline="middle">'+fmt(r.value)+' / '+fmt(r.value2)+'</text>';
      } else { const h=14;
        o+='<rect x="'+lw+'" y="'+(y+(rowH-h)/2)+'" width="'+(r.value/maxv*bw).toFixed(1)+'" height="'+h+'" rx="2.5" fill="'+r.color+'"/>';
        o+='<text x="'+(lw+r.value/maxv*bw+6)+'" y="'+(y+rowH/2)+'" font-size="11" fill="#555" dominant-baseline="middle" font-weight="600">'+fmt(r.value)+'</text>';
      }});
    return o+'</svg>';
  }
  const card=(t,d,svgc)=>'<div class="trend"><h3>'+t+'</h3><p class="td">'+d+'</p>'+svgc+'<div class="tcredit">'+X.credit+'</div></div>';
  const c1=seatOrder.filter(k=>(seatTotals[k]||0)>0).map(k=>({label:shortLab(k),color:blocs[k].color,value:seatTotals[k]}));
  const c2=seatOrder.filter(k=>(seatTotals[k]||0)>0||voteAvg[k]>0.8).map(k=>({label:shortLab(k),color:blocs[k].color,value:voteAvg[k],value2:(seatTotals[k]||0)/totalSeats*100}));
  const c3=leadOrder.filter(k=>(leadCount[k]||0)>0).map(k=>({label:shortLab(k),color:blocs[k].color,value:leadCount[k]}));
  const fpct=v=> LANG==="fr"? v.toFixed(0)+" %" : v.toFixed(0)+"%";
  let html="";
  html+=card(X.t1, X.t1desc(totalSeats,n,shortLab(topS)), makeBar(c1, v=>""+v, false));
  html+=card(X.t2, X.t2desc, makeBar(c2, fpct, true));
  html+=card(X.t3, X.t3desc(shortLab(topL),leadCount[topL]), makeBar(c3, v=>""+v, false));
  document.getElementById("trends").innerHTML=html;
}

/* turnout lede */
function fillTurnout(){
  const tv=declared.filter(d=>d.t!=null); if(!tv.length) return;
  const tavg=tv.reduce((a,d)=>a+d.t,0)/tv.length;
  const tmin=tv.reduce((m,d)=>d.t<m.t?d:m), tmax=tv.reduce((m,d)=>d.t>m.t?d:m);
  const sh=d=>name(d).split(" — ")[0].split(" (")[0];
  const el=document.getElementById("turnoutLede");
  if(el) el.textContent=TX().turnoutLede(tavg.toFixed(0), sh(tmin), nf(tmin.t), sh(tmax), nf(tmax.t));
}

/* ---- RENDER ALL ---- */
function setStatic(){
  const X=TX();
  document.documentElement.lang=LANG;
  document.title=X.title;
  document.getElementById("h1").textContent=X.h1;
  document.getElementById("lede").innerHTML=X.lede;
  document.getElementById("asof").textContent=X.asof;
  document.getElementById("sub").innerHTML=X.sub.replace("{N}",declared.length);
  document.getElementById("mapH2").innerHTML=X.mapH2+' <span class="tag">'+X.mapTag+'</span>';
  document.getElementById("specH2").innerHTML=X.specH2+' <span class="tag">'+X.specTag+'</span>';
  document.getElementById("trendsH2").innerHTML=X.trendsH2+' <span class="tag">'+X.trendsTag+'</span>';
  document.getElementById("affLbl").textContent=X.affichage;
  document.getElementById("metricLbl").textContent=X.resultsBy;
  document.getElementById("segSeats").textContent=X.mSeats;
  document.getElementById("segVotes").textContent=X.mVotes;
  document.getElementById("segWinner").textContent=X.winner;
  document.getElementById("segPie").textContent=X.compo;
  document.getElementById("pendLbl").textContent=X.pending;
  document.getElementById("sortLbl").textContent=X.sortBy;
  document.getElementById("cred1").innerHTML=X.credit;
  document.getElementById("cred2").innerHTML=X.credit;
  document.getElementById("footer").innerHTML=X.footer.replace(/\{N\}/g,declared.length);
  let cl=document.getElementById("chartLegend");
  cl.innerHTML='<b>'+X.specLegend+'</b>'
   +'<span style="margin-left:8px;white-space:nowrap"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#7a756c;vertical-align:middle"></span> '+X.legWon+'</span>'
   +'<span style="margin-left:12px;white-space:nowrap"><span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid #7a756c;vertical-align:middle"></span> '+X.legRan+'</span>';
}
function renderMsum(){
  const el=document.getElementById("msum"); if(!el) return;
  const X=TX();
  const totWord=LANG==="fr"?"sièges":"seats";
  let h='<div class="msum-h">'+(LANG==="fr"?"Sièges par région":"Seats by region")+'</div>';
  continents.forEach(cont=>{
    const sObj=contSeats[cont]||{}, total=order.reduce((t,k)=>t+(sObj[k]||0),0);
    if(total===0) return;
    let chips=''; order.filter(k=>sObj[k]>0).forEach(k=>{
      chips+='<span class="msum-chip"><i style="background:'+blocs[k].color+'"></i><b>'+sObj[k]+'</b> '+blocLab(k)+'</span>';});
    h+='<div class="msum-block"><div class="msum-head"><span class="msum-cont">'+X.contShort[cont]+'</span><span class="msum-total">'+total+' '+totWord+'</span></div><div class="msum-chips">'+chips+'</div></div>';
  });
  el.innerHTML=h;
  const sh=document.getElementById("scrollhint"); if(sh) sh.textContent=(LANG==="fr"?"Faites défiler pour tout voir →":"Scroll sideways to see all →");
}
function setViewLabels(){var hl=document.getElementById("homeLbl");if(hl)hl.textContent=LANG==="fr"?"Accueil":"Home";document.getElementById("viewLbl").textContent=LANG==="fr"?"Vue":"View";document.getElementById("viewFlat").textContent=LANG==="fr"?"Globe entier":"Full globe";document.getElementById("viewGlobe").textContent=LANG==="fr"?"Par région":"By region";}
function render(){
  setViewLabels(); setStatic(); buildLegend(); buildPills(); buildInsets(); updateInsets(); renderMsum(); buildChart(); buildTrends(); fillTurnout();
  if(document.querySelector(".mapwrap")&&document.querySelector(".mapwrap").classList.contains("globe"))buildGlobes();
}

/* controls */
function applyMetric(){ renderMarkers(); buildLegend(); if(document.querySelector(".mapwrap").classList.contains("globe"))buildGlobes(); }
document.getElementById("segSeats").onclick=function(){mapMetric="seats"; this.classList.add("active"); document.getElementById("segVotes").classList.remove("active"); applyMetric();};
document.getElementById("segVotes").onclick=function(){mapMetric="votes"; this.classList.add("active"); document.getElementById("segSeats").classList.remove("active"); applyMetric();};
document.getElementById("segWinner").onclick=function(){mapMode="winner"; this.classList.add("active"); document.getElementById("segPie").classList.remove("active"); renderMarkers(); if(document.querySelector(".mapwrap").classList.contains("globe"))buildGlobes();};
document.getElementById("segPie").onclick=function(){mapMode="pie"; this.classList.add("active"); document.getElementById("segWinner").classList.remove("active"); renderMarkers(); if(document.querySelector(".mapwrap").classList.contains("globe"))buildGlobes();};
document.getElementById("pendingChk").onchange=function(e){showPending=e.target.checked; renderMarkers(); if(document.querySelector(".mapwrap").classList.contains("globe"))buildGlobes();};
document.getElementById("viewFlat").onclick=function(){document.querySelector(".mapwrap").classList.remove("globe");this.classList.add("active");document.getElementById("viewGlobe").classList.remove("active");setTimeout(()=>map.invalidateSize(),60);};
document.getElementById("viewGlobe").onclick=function(){document.querySelector(".mapwrap").classList.add("globe");this.classList.add("active");document.getElementById("viewFlat").classList.remove("active");buildGlobes();};
document.getElementById("langFr").onclick=function(){if(LANG==="fr")return; LANG="fr"; this.classList.add("active"); document.getElementById("langEn").classList.remove("active"); render();};
document.getElementById("langEn").onclick=function(){if(LANG==="en")return; LANG="en"; this.classList.add("active"); document.getElementById("langFr").classList.remove("active"); render();};

renderMarkers();
render();
if(window.matchMedia("(max-width:640px)").matches){document.getElementById("viewGlobe").click();}
setTimeout(()=>map.invalidateSize(),200);
window.addEventListener("resize",()=>{setTimeout(layout,50); setTimeout(()=>map.invalidateSize(),60);});
</script>
